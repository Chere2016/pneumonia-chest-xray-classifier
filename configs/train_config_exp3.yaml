# configs/train_config_exp3.yaml
# Experiment 3: Fix the LR death problem from Exp2.
#
# Root Cause of Exp2 failure:
#   - scheduler_factor=0.1 in YAML was IGNORED (train.py had hardcoded factor=0.1, patience=3)
#   - LR dropped 10x twice within 20 epochs and flatlined at ~0 for 80 wasted epochs
#
# Fix applied:
#   - train.py now reads scheduler_patience, scheduler_factor, min_lr from config
#   - factor=0.5  → LR halves gently instead of 10x drops
#   - patience=7  → Waits longer before each LR drop
#   - min_lr=1e-6 → Hard floor prevents LR from ever reaching 0

experiment_name: "medical_cnn_chest_xray_exp3"
data_dir: "data_resized"

# Hyperparameters
num_epochs: 60
batch_size: 32
learning_rate: 0.0001

# Scheduler — THE critical fix for Exp3
scheduler_patience: 7      # Wait 7 epochs of no improvement before dropping LR
scheduler_factor: 0.5      # Halve the LR (0.0001 → 0.00005 → 0.000025 ...) NOT 10x drops
min_lr: 0.000001           # Hard floor: LR will NEVER go below 1e-6

# Regularization
weight_decay: 0.0001

# Augmentation
use_color_jitter: false

# Imbalance handling
pos_weight: null  # Calculated dynamically from class distribution
